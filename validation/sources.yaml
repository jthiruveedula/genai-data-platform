# Claim registry (PLAN.md §9.1).
#
# Every claimId referenced from site/src/data/flavors/*.ts must have a
# matching entry here. This is a seed: `sources` is intentionally empty and
# `verified_on` is null for every claim until a real Firecrawl validation
# run (§9.2) checks each source and fills them in. Until then, the site's
# FlavorTabs chip renders these claims as "unverified" rather than falsely
# claiming they've been checked.

claims:
  - id: gcp-vertex-model-garden
    used_by: site/src/data/flavors/gcp.ts#00-foundations
    claim: "Vertex AI Model Garden is where embedding and LLM models are selected on GCP"
    sources: []
    volatility: medium
    verified_on: null

  - id: gcp-dataflow-ingestion
